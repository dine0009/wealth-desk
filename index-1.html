<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cobra · Wealth Desk</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1b2230;--bd:#262d38;--tx:#e6edf3;--dim:#8b96a5;--faint:#5b6573;--gold:#d4af6a;--grn:#3fb950;--red:#f85149;--blu:#58a6ff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:18px 14px 70px}
  .wrap{max-width:980px;margin:0 auto}
  h1{font-size:21px;margin:0;display:flex;align-items:center;gap:8px}
  h1::before{content:"";width:9px;height:22px;background:var(--gold);border-radius:2px}
  .sub{color:var(--dim);font-size:12.5px;margin:6px 0 0 17px}
  .panel{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:15px 17px;margin-bottom:13px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
  .dim{color:var(--dim)}.faint{color:var(--faint)}.grn{color:var(--grn)}.red{color:var(--red)}.goldc{color:var(--gold)}
  .lbl{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);font-weight:600}
  input[type=number],input[type=text]{background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;text-align:right;outline:none;width:90px}
  input[type=text]{text-align:left}
  button{cursor:pointer;font-family:inherit;border-radius:9px;border:1px solid var(--bd);background:var(--panel);color:var(--dim);padding:8px 13px;font-size:13px;font-weight:600}
  button.primary{background:rgba(212,175,106,.14);border-color:var(--gold);color:var(--gold);font-weight:700}
  button.danger{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.12)}
  button:disabled{opacity:.5;cursor:wait}
  table{width:100%;border-collapse:collapse}
  th{text-align:right;padding:0 4px 8px;font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  th:first-child{text-align:left}
  td{padding:8px 4px;text-align:right;font-family:ui-monospace,Menlo,monospace;font-size:12.8px;border-top:1px solid var(--bd)}
  td:first-child{text-align:left;font-family:inherit;font-size:13px}
  .toggle{width:38px;height:22px;border-radius:22px;border:none;position:relative;padding:0;flex-shrink:0}
  .toggle span{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;transition:left .15s}
  .toggle.on{background:var(--gold)}.toggle.on span{left:18px;background:var(--bg)}
  .toggle.off{background:var(--bd)}.toggle.off span{left:2px;background:var(--dim)}
  .big{font-size:36px;font-weight:700;letter-spacing:-1px}
  .tabs{display:flex;gap:6px;margin-bottom:15px}
  .tabs button{flex:1;padding:11px}
  .tabs button.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,106,.12)}
  .stat{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:13px 15px}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:13px}
  .hint{color:var(--faint);font-size:11.5px;line-height:1.55;margin:10px 0 0}
  .msg-ok{color:var(--grn);font-size:12px;line-height:1.5;flex-basis:100%}
  .msg-err{color:var(--red);font-size:12px;line-height:1.5;flex-basis:100%}
  .bar{height:9px;border-radius:5px;background:var(--bd);overflow:hidden;margin-top:4px}
  .bar i{display:block;height:100%}
  .hrow{display:flex;flex-wrap:wrap;gap:12px 22px;margin-top:12px}
  .hcol{display:flex;flex-direction:column;gap:5px}
  input[type=range]{width:100%;accent-color:var(--gold)}
  .del{border:none;background:none;color:var(--faint);font-size:15px;padding:2px 6px}
  .del:hover{color:var(--red)}
  svg text{font-family:ui-monospace,Menlo,monospace}
  @media(max-width:640px){.big{font-size:29px}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
"use strict";
/* ================= Cobra Wealth Desk — GitHub Pages edition =================
   All values SGD. Live quotes: Finnhub (stocks/ETFs, free API key),
   CoinGecko (BTC + PAXG≈1oz gold, no key), Frankfurter (USD→SGD, no key).
   Monthly buys land on the 20th. Data saved in this browser (localStorage);
   use Export/Import to sync between devices.
   ========================================================================== */

const LS_KEY = "cobra-wealth-desk-gh-v1";

const DEFAULTS = {
  datum: "2026-07-18",              // statement date the seeds below reflect
  lastUpdated: null,
  fx: 1.29,
  apiKey: "",
  saxoToken: "",
  saxoAppKey: "",
  saxoOauth: null,
  tokenProxy: "",
  saxoEnv: "live",
  goldDiscount: 2.0,                // % below spot that the bank buys back at
  stocks: [
    { id:"tsla",  tick:"TSLA",  name:"Tesla",                qty:2.614, cost:295.53,   price:380.20, on:true },
    { id:"googl", tick:"GOOGL", name:"Alphabet Class A",     qty:4.37,  cost:177.38,   price:346.66, on:true },
    { id:"spcx",  tick:null,    name:"SpaceX (private)",     qty:12,    cost:164.46,   price:123.90, on:true },
    { id:"ktos",  tick:"KTOS",  name:"Kratos Defense",       qty:18,    cost:46.13,    price:45.94,  on:true },
    { id:"orcl",  tick:"ORCL",  name:"Oracle",               qty:20,    cost:192.71,   price:126.48, on:true },
    { id:"pltr",  tick:"PLTR",  name:"Palantir",             qty:95,    cost:134.5,    price:132.25, on:true },
    { id:"smh",   tick:"SMH",   name:"VanEck Semiconductor", qty:18,    cost:218.3728, price:555.20, on:true },
  ],
  btc:  { qty:0.0415606, price:82272, cost:4548.90, on:true },
  gold: { oz:2, price:5581, cost:11641.26, on:true },
  snp:  { qty:34.3574, wac:669.423, price:746.72, on:true },
  ge:   { value:34006, paid:30000, on:true },
  cpf:  { value:263272.67, on:true },
  year: 2036,
  rate: { stocks:8, btc:10, snp:8, gold:6, ge:5, cpf:4 },
  tab: "current",
};
const SNP_MONTHLY=2000, GE_MONTHLY=500, GOLD_OZ_YR=2, BASE_YEAR=2026;

/* ---------- state ---------- */
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d = JSON.parse(raw); return deepMerge(structuredClone(DEFAULTS), d); }
  }catch(e){}
  return structuredClone(DEFAULTS);
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); setSaveState("Saved"); }
  catch(e){ setSaveState("Save unavailable here"); }
}
function deepMerge(base, over){
  for(const k in over){
    if(over[k] && typeof over[k]==="object" && !Array.isArray(over[k]) && base[k]) deepMerge(base[k], over[k]);
    else base[k] = over[k];
  }
  return base;
}
function setSaveState(t){ const el=document.getElementById("savestate"); if(el) el.textContent=t; }

/* ---------- utils ---------- */
const sgd=(n,dp=0)=>(n<0?"-":"")+"S$"+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const pc=(n,dp=1)=>(n>=0?"+":"")+n.toFixed(dp)+"%";
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtD=iso=>{try{return new Date(iso+(iso.length===10?"T00:00:00":"")).toLocaleDateString("en-SG",{day:"numeric",month:"short",year:"numeric"})}catch(e){return iso}};
const fmtDT=iso=>{try{return new Date(iso).toLocaleString("en-SG",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}catch(e){return iso}};
const inRange=(v,lo,hi)=>typeof v==="number"&&isFinite(v)&&v>=lo&&v<=hi?v:null;
function countDay20s(fromISO,to){
  const a=new Date(fromISO+"T00:00:00");
  let d=new Date(a.getFullYear(),a.getMonth(),20);
  if(d<=a) d=new Date(a.getFullYear(),a.getMonth()+1,20);
  let n=0; while(d<=to){n++; d=new Date(d.getFullYear(),d.getMonth()+1,20);} return n;
}
const annuity=(g,n)=>Math.abs(g)<1e-9?n:(Math.pow(1+g,n)-1)/g;
const fv=(v0,g,c,n)=>v0*Math.pow(1+g,n)+c*annuity(g,n);
function irr(cf){
  const npv=r=>cf.reduce((s,c,t)=>s+c/Math.pow(1+r,t),0);
  let lo=-0.95,hi=5,flo=npv(lo);
  if(flo*npv(hi)>0) return null;
  for(let i=0;i<200;i++){const m=(lo+hi)/2,fm=npv(m);
    if(Math.abs(fm)<1e-4)return m;
    if(flo*fm<0)hi=m;else{lo=m;flo=fm;}}
  return (lo+hi)/2;
}

/* ---------- derived ---------- */
function current(){
  const rows=S.stocks.map(s=>{const value=s.qty*s.price*S.fx,cost=s.qty*s.cost*S.fx;
    return {...s,value,cost,pl:value-cost,plPct:cost?(value-cost)/cost*100:0};});
  const stVal=rows.filter(r=>r.on).reduce((a,r)=>a+r.value,0);
  const stCost=rows.filter(r=>r.on).reduce((a,r)=>a+r.cost,0);
  const btcV=S.btc.qty*S.btc.price, goldV=S.gold.oz*S.gold.price;
  const snpV=S.snp.qty*S.snp.price*S.fx, snpC=S.snp.qty*S.snp.wac*S.fx;
  const items=[
    {key:"Stocks (SAXO)",value:stVal,cost:stCost,on:rows.some(r=>r.on),color:"var(--blu)",ck:"stocks"},
    {key:"Bitcoin",value:btcV,cost:S.btc.cost,on:S.btc.on,color:"var(--gold)",ck:"btc"},
    {key:"Gold ("+S.gold.oz+"oz)",value:goldV,cost:S.gold.cost,on:S.gold.on,color:"#e3b341",ck:"gold"},
    {key:"S&P 500 (FSM)",value:snpV,cost:snpC,on:S.snp.on,color:"var(--grn)",ck:"snp"},
    {key:"Great Eastern",value:S.ge.value,cost:S.ge.paid,on:S.ge.on,color:"#bc8cff",ck:"ge"},
    {key:"CPF Special Acct",value:S.cpf.value,cost:S.cpf.value,on:S.cpf.on,color:"#39c5cf",ck:"cpf"},
  ];
  const tot=items.filter(i=>i.on).reduce((a,i)=>a+i.value,0);
  const totC=items.filter(i=>i.on).reduce((a,i)=>a+i.cost,0);
  return {rows,items,tot,totC};
}
function projection(){
  const cur=current();
  const g=Object.fromEntries(Object.entries(S.rate).map(([k,v])=>[k,v/100]));
  const N=Math.max(1,S.year-BASE_YEAR);
  const goldA=S.gold.on?GOLD_OZ_YR*S.gold.price:0, snpA=S.snp.on?SNP_MONTHLY*12:0, geA=S.ge.on?GE_MONTHLY*12:0;
  const v0={stocks:cur.items[0].on?cur.items[0].value:0, btc:S.btc.on?cur.items[1].value:0,
    gold:S.gold.on?cur.items[2].value:0, snp:S.snp.on?cur.items[3].value:0,
    ge:S.ge.on?cur.items[4].value:0, cpf:S.cpf.on?cur.items[5].value:0};
  const at=t=>({stocks:fv(v0.stocks,g.stocks,0,t),btc:fv(v0.btc,g.btc,0,t),gold:fv(v0.gold,g.gold,goldA,t),
    snp:fv(v0.snp,g.snp,snpA,t),ge:fv(v0.ge,g.ge,geA,t),cpf:fv(v0.cpf,g.cpf,0,t)});
  const fin=at(N);
  const rows=[
    {key:"Stocks (SAXO)",rk:"stocks",now:v0.stocks,fv:fin.stocks,contrib:0,on:cur.items[0].on},
    {key:"Bitcoin",rk:"btc",now:v0.btc,fv:fin.btc,contrib:0,on:S.btc.on},
    {key:"Gold",rk:"gold",now:v0.gold,fv:fin.gold,contrib:goldA,on:S.gold.on},
    {key:"S&P 500 (FSM)",rk:"snp",now:v0.snp,fv:fin.snp,contrib:snpA,on:S.snp.on},
    {key:"Great Eastern",rk:"ge",now:v0.ge,fv:fin.ge,contrib:geA,on:S.ge.on},
    {key:"CPF SA",rk:"cpf",now:v0.cpf,fv:fin.cpf,contrib:0,on:S.cpf.on},
  ].filter(r=>r.on);
  const totFV=rows.reduce((a,r)=>a+r.fv,0);
  const start=Object.values(v0).reduce((a,b)=>a+b,0);
  const contribYr=goldA+snpA+geA, totContrib=contribYr*N;
  const cf=Array(N+1).fill(-contribYr); cf[0]=-start; cf[N]=-contribYr+totFV;
  const r=irr(cf);
  const series=[]; for(let t=0;t<=N;t++){const f=at(t);series.push({year:BASE_YEAR+t,total:Object.values(f).reduce((a,b)=>a+b,0)});}
  return {rows,totFV,start,totContrib,contribYr,profit:totFV-start-totContrib,irr:r,series,N};
}

/* ---------- live update ---------- */
let updating=false, updMsg=null, updStep="";
async function updatePrices(){
  if(updating) return;
  updating=true; updMsg=null; updStep="Fetching…"; render();
  const applied=[], missing=[];
  try{
    /* 1. FX (no key) */
    updStep="FX rate…"; render();
    try{
      const r=await fetch("https://api.frankfurter.app/latest?from=USD&to=SGD");
      const j=await r.json(); const v=inRange(j&&j.rates&&j.rates.SGD,1.05,1.6);
      if(v){S.fx=v;applied.push("USD/SGD");}else missing.push("USD/SGD");
    }catch(e){missing.push("USD/SGD");}

    /* 2. BTC + gold proxy via CoinGecko (no key). PAXG ≈ 1 troy oz gold */
    updStep="BTC + gold…"; render();
    try{
      const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=sgd");
      const j=await r.json();
      const b=inRange(j&&j.bitcoin&&j.bitcoin.sgd,10000,1000000);
      if(b){S.btc.price=b;applied.push("BTC");}else missing.push("BTC");
      const gSpot=inRange(j&&j["pax-gold"]&&j["pax-gold"].sgd,2500,15000);
      if(gSpot){S.gold.price=Math.round(gSpot*(1-S.goldDiscount/100)*100)/100;applied.push("Gold");}
      else missing.push("Gold");
    }catch(e){missing.push("BTC","Gold");}

    /* 3. Stocks + IVV via Finnhub (free key) */
    const key=(S.apiKey||"").trim();
    const ticks=S.stocks.filter(s=>s.tick).map(s=>s.tick);
    if(key){
      for(const t of [...ticks,"IVV"]){
        updStep="Quote "+t+"…"; render();
        try{
          const r=await fetch("https://finnhub.io/api/v1/quote?symbol="+encodeURIComponent(t)+"&token="+encodeURIComponent(key));
          if(r.status===401||r.status===403) throw new Error("bad API key");
          const j=await r.json(); const p=inRange(j&&j.c,0.5,100000);
          if(p){
            if(t==="IVV"){S.snp.price=p;}
            else{const s=S.stocks.find(x=>x.tick===t); if(s)s.price=p;}
            applied.push(t);
          }else missing.push(t);
        }catch(e){ missing.push(t); if(String(e.message).includes("bad API key")){missing.push("(check key)");break;} }
      }
    }else{
      missing.push("stocks & IVV (no Finnhub key — add your free key above)");
    }

    /* 4. Roll contributions forward from datum (buys on the 20th) */
    const now=new Date();
    const buys=countDay20s(S.datum,now);
    const yearsFloat=Math.max(0,(now-new Date(S.datum+"T00:00:00"))/86400000/365.25);
    if(buys>0){
      const unitsAdd=(buys*SNP_MONTHLY)/(S.snp.price*S.fx);
      S.snp.wac=(S.snp.qty*S.snp.wac+unitsAdd*S.snp.price)/(S.snp.qty+unitsAdd);
      S.snp.qty+=unitsAdd;
      S.ge.value=S.ge.value*Math.pow(1.05,yearsFloat)+buys*GE_MONTHLY;
      S.ge.paid+=buys*GE_MONTHLY;
    }else{
      S.ge.value=S.ge.value*Math.pow(1.05,yearsFloat);
    }
    S.cpf.value=S.cpf.value*Math.pow(1.04,yearsFloat);
    const yrsFull=Math.floor(yearsFloat);
    if(yrsFull>0){S.gold.oz+=yrsFull*GOLD_OZ_YR; S.gold.cost+=yrsFull*GOLD_OZ_YR*S.gold.price;}

    const oldDatum=S.datum;
    S.datum=now.toISOString().slice(0,10);
    S.lastUpdated=now.toISOString();
    updMsg={ok:true,text:"Updated "+applied.length+" quotes"+
      (missing.length?" · couldn't fetch: "+missing.join(", ")+" — kept previous":"")+
      (buys>0?" · added "+buys+" monthly buy"+(buys>1?"s":"")+" (20th) since "+fmtD(oldDatum):" · no 20th has passed since datum, no contributions added")};
  }catch(e){
    updMsg={ok:false,text:"Update failed: "+(e&&e.message||"unknown")+". Numbers unchanged."};
  }finally{
    updating=false; updStep=""; save(); render();
  }
}

/* ---------- SAXO OAuth 2.0 (PKCE — matches a Grant Type "PKCE" app on developer.saxo) ---------- */
const SAXO_AUTH={live:"https://live.logonvalidation.net",sim:"https://sim.logonvalidation.net"};
const saxoRedirectUri=()=>location.origin+location.pathname;
const b64url=bytes=>btoa(String.fromCharCode(...new Uint8Array(bytes))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
async function saxoLogin(){
  const appKey=(S.saxoAppKey||"").trim();
  if(!appKey){saxoMsg={ok:false,text:"Enter your SAXO App Key first (from your PKCE app on developer.saxo)."};render();return;}
  const verifier=b64url(crypto.getRandomValues(new Uint8Array(48)));
  const challenge=b64url(await crypto.subtle.digest("SHA-256",new TextEncoder().encode(verifier)));
  const state=b64url(crypto.getRandomValues(new Uint8Array(12)));
  sessionStorage.setItem("saxo_pkce",JSON.stringify({verifier,state,env:S.saxoEnv}));
  const u=new URL(SAXO_AUTH[S.saxoEnv]+"/authorize");
  u.search=new URLSearchParams({response_type:"code",client_id:appKey,redirect_uri:saxoRedirectUri(),
    code_challenge:challenge,code_challenge_method:"S256",state}).toString();
  location.href=u.toString();
}
async function saxoTokenRequest(params){
  const proxy=(S.tokenProxy||"").trim();
  const target=proxy
    ? proxy.replace(/\/+$/,"")+"?env="+S.saxoEnv
    : SAXO_AUTH[S.saxoEnv]+"/token"; // direct call is blocked by SAXO for browsers — proxy needed
  let r;
  try{
    r=await fetch(target,{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams(params).toString()});
  }catch(e){
    throw new Error(proxy
      ? "couldn't reach your token relay — check the Worker URL"
      : "SAXO blocks this call from browsers. Set up the free token relay (Token relay URL field) — see worker.js instructions");
  }
  const j=await r.json().catch(()=>null);
  if(!r.ok||!j||!j.access_token) throw new Error((j&&(j.error_description||j.error))||("token HTTP "+r.status));
  S.saxoOauth={access:j.access_token,refresh:j.refresh_token||null,
    exp:Date.now()+((+j.expires_in||1200)*1000),
    refreshExp:Date.now()+((+j.refresh_token_expires_in||3600)*1000)};
  save();
}
async function saxoHandleRedirect(){
  const q=new URLSearchParams(location.search);
  if(!q.get("code")) return false;
  const st=JSON.parse(sessionStorage.getItem("saxo_pkce")||"null");
  sessionStorage.removeItem("saxo_pkce");
  history.replaceState(null,"",location.pathname);
  if(!st||st.state!==q.get("state")){saxoMsg={ok:false,text:"SAXO login state mismatch — please try logging in again."};return false;}
  S.saxoEnv=st.env;
  try{
    await saxoTokenRequest({grant_type:"authorization_code",code:q.get("code"),
      redirect_uri:saxoRedirectUri(),client_id:(S.saxoAppKey||"").trim(),code_verifier:st.verifier});
    saxoMsg={ok:true,text:"SAXO connected — tokens auto-refresh while this page is open."};
    return true;
  }catch(e){saxoMsg={ok:false,text:"SAXO login failed: "+(e&&e.message||"unknown")};return false;}
}
async function saxoAccessToken(){
  const o=S.saxoOauth;
  if(o&&o.access){
    if(Date.now()<o.exp-60000) return o.access;
    if(o.refresh&&Date.now()<o.refreshExp){
      try{await saxoTokenRequest({grant_type:"refresh_token",refresh_token:o.refresh,
        client_id:(S.saxoAppKey||"").trim()}); return S.saxoOauth.access;}
      catch(e){S.saxoOauth=null;save();}
    }else{S.saxoOauth=null;save();}
  }
  return (S.saxoToken||"").trim()||null; // fallback: pasted 24h token
}
function saxoLogout(){S.saxoOauth=null;save();render();}

/* ---------- SAXO OpenAPI sync: pull real positions ---------- */
let saxoBusy=false, saxoMsg=null;
async function syncSaxo(){
  if(saxoBusy) return;
  saxoBusy=true; saxoMsg=null; render();
  try{
    const tok=await saxoAccessToken();
    if(!tok) throw new Error("session expired or not connected — tap Login with SAXO (or paste a 24-hour token as fallback)");
    const base = S.saxoEnv==="sim" ? "https://gateway.saxobank.com/sim/openapi" : "https://gateway.saxobank.com/openapi";
    const r=await fetch(base+"/port/v1/positions/me?FieldGroups=PositionBase,PositionView,DisplayAndFormat",
      {headers:{Authorization:"Bearer "+tok}});
    if(r.status===401) throw new Error("token rejected or expired — 24-hour tokens need a fresh paste daily");
    if(!r.ok) throw new Error("SAXO HTTP "+r.status);
    const j=await r.json();
    const list=(j&&j.Data)||[];
    if(!list.length){
      saxoMsg={ok:true,text:"Connected to SAXO ("+S.saxoEnv+") — this account currently holds 0 positions. On Sim that's normal (demo accounts start empty); switch to Live for your real portfolio."};
      saxoBusy=false; save(); render(); return;
    }
    /* aggregate lots by symbol (weighted avg open price) */
    const agg={};
    list.forEach(p=>{
      const b=p.PositionBase||{}, v=p.PositionView||{}, d=p.DisplayAndFormat||{};
      const qty=+b.Amount||0; if(qty<=0) return;
      const sym=((d.Symbol||"").split(":")[0]||("UIC"+b.Uic)).toUpperCase();
      const a=agg[sym]||(agg[sym]={sym,name:d.Description||sym,qty:0,costSum:0,price:0});
      a.qty+=qty; a.costSum+=qty*(+b.OpenPrice||0);
      if(+v.CurrentPrice>0) a.price=+v.CurrentPrice;
    });
    const mapped=Object.values(agg).map(a=>({
      id:"sx-"+a.sym, tick:a.sym, name:a.name, qty:a.qty,
      cost:a.qty?a.costSum/a.qty:0, price:a.price||((a.costSum/a.qty)||0),
      on:true, saxo:true,
    }));
    /* keep prior include/exclude choices; drop old rows that SAXO now covers */
    mapped.forEach(m=>{
      const prev=S.stocks.find(s=>s.tick===m.tick || (s.name&&m.name&&(m.name.toLowerCase().includes(s.name.toLowerCase())||s.name.toLowerCase().includes(m.name.toLowerCase()))));
      if(prev) m.on=prev.on;
    });
    const leftovers=S.stocks.filter(s=>!s.saxo && !mapped.some(m=>
      m.tick===s.tick || (s.name&&m.name&&(m.name.toLowerCase().includes(s.name.toLowerCase())||s.name.toLowerCase().includes(m.name.toLowerCase())))));
    S.stocks=[...mapped,...leftovers];
    S.lastUpdated=new Date().toISOString();
    saxoMsg={ok:true,text:"Synced "+mapped.length+" positions from SAXO ("+S.saxoEnv+") — quantities, avg costs and prices are now exact."};
  }catch(e){
    saxoMsg={ok:false,text:"SAXO sync failed: "+(e&&e.message||"unknown")+"."};
  }finally{
    saxoBusy=false; save(); render();
  }
}

/* ---------- add / remove tickers ---------- */
async function addTicker(){
  const t=(document.getElementById("newtick").value||"").trim().toUpperCase();
  const q=parseFloat(document.getElementById("newqty").value);
  const c=parseFloat(document.getElementById("newcost").value);
  if(!t||!(q>0)||!(c>0)){alert("Enter ticker, quantity and avg cost (USD).");return;}
  if(S.stocks.some(s=>s.tick===t)){alert(t+" is already in the list.");return;}
  const row={id:"u"+Date.now(),tick:t,name:t,qty:q,cost:c,price:c,on:true};
  S.stocks.push(row);
  const key=(S.apiKey||"").trim();
  if(key){
    try{
      const r=await fetch("https://finnhub.io/api/v1/quote?symbol="+encodeURIComponent(t)+"&token="+encodeURIComponent(key));
      const j=await r.json(); const p=inRange(j&&j.c,0.5,100000);
      if(p) row.price=p;
      try{
        const r2=await fetch("https://finnhub.io/api/v1/stock/profile2?symbol="+encodeURIComponent(t)+"&token="+encodeURIComponent(key));
        const j2=await r2.json(); if(j2&&j2.name) row.name=j2.name;
      }catch(e){}
    }catch(e){}
  }
  save(); render();
}
function delStock(id){ S.stocks=S.stocks.filter(s=>s.id!==id); save(); render(); }

/* ---------- export / import ---------- */
function doExport(){
  const copy=structuredClone(S); copy.saxoToken=""; copy.apiKey=""; copy.saxoOauth=null;  // never export credentials
  const blob=new Blob([JSON.stringify(copy,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="cobra-wealth-"+new Date().toISOString().slice(0,10)+".json"; a.click();
}
function doImport(ev){
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{S=deepMerge(structuredClone(DEFAULTS),JSON.parse(rd.result));save();render();}
    catch(e){alert("Couldn't read that file.");}};
  rd.readAsText(f);
}
let armReset=false;
function doReset(){
  if(!armReset){armReset=true;render();setTimeout(()=>{armReset=false;render();},4000);return;}
  S=structuredClone(DEFAULTS); armReset=false; save(); render();
}

/* ---------- field edit plumbing (event delegation, commit on change) ---------- */
function bindField(path){ return 'data-path="'+path+'"'; }
document.addEventListener("change",e=>{
  const p=e.target.getAttribute&&e.target.getAttribute("data-path");
  if(!p)return;
  const raw=e.target.value;
  const parts=p.split(".");
  let o=S; for(let i=0;i<parts.length-1;i++){
    o = parts[i].startsWith("#") ? S.stocks.find(s=>s.id===parts[i].slice(1)) : o[parts[i]];
    if(!o) return;
  }
  const last=parts[parts.length-1];
  o[last] = (e.target.type==="number") ? (raw===""?0:parseFloat(raw)) : raw;
  save(); render();
});
document.addEventListener("click",e=>{
  const t=e.target.closest&&e.target.closest("[data-toggle]");
  if(t){
    const p=t.getAttribute("data-toggle");
    if(p.startsWith("#")){const s=S.stocks.find(x=>x.id===p.slice(1)); if(s)s.on=!s.on;}
    else S[p].on=!S[p].on;
    save(); render(); return;
  }
  const d=e.target.closest&&e.target.closest("[data-del]");
  if(d){ delStock(d.getAttribute("data-del")); return; }
});

function holding(title,ck,on,value,pl,cost,fields,hint,noPl){
  let h='<div class="panel" style="opacity:'+(on?1:.45)+'"><div class="row"><b style="font-size:14px">'+esc(title)+'</b>'
    +'<span style="display:flex;align-items:center;gap:14px"><span style="text-align:right"><span class="mono" style="font-size:16px;font-weight:700;display:block">'+sgd(value)+'</span>'
    +(noPl?'':'<span style="font-size:12px">'+plSpan(pl)+' <span class="faint" style="font-size:11px">'+(cost?pc(pl/cost*100):"")+'</span></span>')
    +'</span>'+toggleBtn(ck,on)+'</span></div><div class="hrow">';
  fields.forEach(f=>{h+='<div class="hcol"><span class="lbl">'+esc(f[0])+'</span>'+numIn(f[1],f[2],f[3])+'</div>';});
  h+='</div>'+(hint?'<p class="hint">'+esc(hint)+'</p>':'')+'</div>';
  return h;
}
function stat(lbl,val,color,big){
  return '<div class="stat"><div class="lbl" style="margin-bottom:7px">'+esc(lbl)+'</div>'
    +'<div class="mono" style="font-weight:700;font-size:'+(big?21:16)+'px;color:'+color+'">'+val+'</div></div>';
}
function chart(series){
  const W=640,H=210,padL=52,padB=22,padT=10,padR=12;
  const xs=series.map(p=>p.year), ys=series.map(p=>p.total);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=0,y1=Math.max(...ys)*1.05||1;
  const X=v=>padL+(v-x0)/(x1-x0||1)*(W-padL-padR);
  const Y=v=>H-padB-(v-y0)/(y1-y0)*(H-padB-padT);
  const pts=series.map(p=>X(p.year).toFixed(1)+","+Y(p.total).toFixed(1)).join(" ");
  let grid="";
  for(let i=0;i<=4;i++){const v=y1*i/4,y=Y(v);
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#262d38" stroke-width="1"/>'
      +'<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="#5b6573">'+(v>=1e6?(v/1e6).toFixed(1)+"M":Math.round(v/1000)+"k")+'</text>';}
  const lastY=series[series.length-1];
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+grid
    +'<polyline points="'+pts+'" fill="none" stroke="#d4af6a" stroke-width="2.5"/>'
    +'<text x="'+padL+'" y="'+(H-6)+'" font-size="10" fill="#5b6573">'+x0+'</text>'
    +'<text x="'+(W-padR)+'" y="'+(H-6)+'" text-anchor="end" font-size="10" fill="#5b6573">'+x1+'</text>'
    +'<circle cx="'+X(lastY.year)+'" cy="'+Y(lastY.total)+'" r="3.5" fill="#d4af6a"/></svg>';
}
